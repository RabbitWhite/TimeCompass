name: Deploy to GitHub Pages

on:
  push:
    branches: [main, claude/lifetracker-mobile-app-xnOiw, claude/fix-mobile-syncing-a0x4o]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - run: npm install

      - run: npm run build

      - uses: actions/upload-pages-artifact@v3
        with:
          path: ./dist

  deploy:
    needs: build
    # Only deploy from branches the github-pages environment allows.
    # Feature branches (e.g. claude/fix-*) are blocked by protection rules.
    if: |
      github.ref == 'refs/heads/main' ||
      github.ref == 'refs/heads/claude/lifetracker-mobile-app-xnOiw'
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4

<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>LifeTracker</title>
    <script>
      // GitHub Pages SPA redirect: convert path to hash so index.html can handle it
      var path = window.location.pathname;
      var base = '/Lifetracker/';
      if (path.startsWith(base)) {
        var route = path.slice(base.length);
        if (route) {
          window.location.replace(base + '#/' + route + window.location.search + window.location.hash);
        } else {
          window.location.replace(base);
        }
      } else {
        window.location.replace(base);
      }
    </script>
  </head>
  <body>
  </body>
</html>

name: Deploy to GitHub Pages

on:
  push:
    # Only deploy from the active development branch (dist/ must be committed).
    # The laptop session branch (claude/lifetracker-mobile-app-xnOiw) uses a Vite
    # build and has no dist/ — deploying from it would cause a CI failure and
    # potentially overwrite the live site with an older build.
    branches: [main, claude/fix-mobile-syncing-a0x4o]
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # The dist/ folder is pre-built locally via build-cdn.sh (uses tsc, no npm registry needed).
      # Just deploy it to gh-pages.
      - name: Deploy to gh-pages branch
        run: |
          cd dist
          git init
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add .
          git commit -m "deploy: ${{ github.sha }}"
          git push --force \
            "https://x-access-token:${{ github.token }}@github.com/${{ github.repository }}.git" \
            HEAD:gh-pages

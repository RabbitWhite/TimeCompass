name: Deploy to GitHub Pages

on:
  push:
    branches: [main, claude/lifetracker-mobile-app-xnOiw, claude/fix-mobile-syncing-a0x4o]
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - run: npm install

      - run: npm run build

      # Push dist/ directly to the gh-pages branch.
      # This bypasses the github-pages environment and its branch
      # protection rules, so it works from any trigger branch.
      - name: Deploy to gh-pages branch
        run: |
          cd dist
          git init
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add .
          git commit -m "deploy: ${{ github.sha }}"
          git push --force \
            "https://x-access-token:${{ github.token }}@github.com/${{ github.repository }}.git" \
            HEAD:gh-pages
